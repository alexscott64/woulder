name: Deploy Dashboards

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'backend/static/**'
      - '.github/workflows/deploy-dashboard.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy static files to server
        run: |
          # Ensure static directory exists
          ssh -i ~/.ssh/id_ed25519 root@${{ secrets.VPS_HOST }} "mkdir -p /opt/woulder/static"
          
          # Upload all static files
          scp -i ~/.ssh/id_ed25519 -r backend/static/* root@${{ secrets.VPS_HOST }}:/opt/woulder/static/
          
          # Restart service to pick up changes
          ssh -i ~/.ssh/id_ed25519 root@${{ secrets.VPS_HOST }} "systemctl restart woulder"
          
          echo "Dashboards deployed successfully!"

      - name: Notify deployment
        if: success()
        run: |
          echo "✅ Dashboards deployed successfully!"
          echo "📊 jtrack: https://woulder.com/jtrack"
          echo "📊 iglooghost: https://woulder.com/iglooghost"
          
      - name: Notify failure
        if: failure()
        run: |
          echo "❌ Dashboard deployment failed!"
          echo "Check the logs above for details"
