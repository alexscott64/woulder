name: Deploy Woulder

on:
  push:
    branches: [master]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Build Go backend for Linux
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build backend
        run: |
          cd backend
          GOOS=linux GOARCH=amd64 go build -o woulder-api ./cmd/server
          GOOS=linux GOARCH=amd64 go build -o woulder-migrate ./cmd/migrate

      # Build frontend
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build
        env:
          VITE_API_URL: https://woulder.com/api

      # Deploy to VPS
      - name: Set up SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy backend
        run: |
          # Stop existing service
          ssh -i ~/.ssh/id_ed25519 root@${{ secrets.VPS_HOST }} "systemctl stop woulder || true"

          # Upload new binary
          scp -i ~/.ssh/id_ed25519 backend/woulder-api root@${{ secrets.VPS_HOST }}:/opt/woulder/woulder-api
          scp -i ~/.ssh/id_ed25519 backend/woulder-migrate root@${{ secrets.VPS_HOST }}:/opt/woulder/woulder-migrate

          # Upload migrations and static files (dashboards)
          ssh -i ~/.ssh/id_ed25519 root@${{ secrets.VPS_HOST }} "mkdir -p /opt/woulder/static /opt/woulder/migrations /var/lib/woulder/uploads"
          scp -i ~/.ssh/id_ed25519 backend/internal/database/migrations/* root@${{ secrets.VPS_HOST }}:/opt/woulder/migrations/
          scp -i ~/.ssh/id_ed25519 -r backend/static/* root@${{ secrets.VPS_HOST }}:/opt/woulder/static/
          ssh -i ~/.ssh/id_ed25519 root@${{ secrets.VPS_HOST }} "chown -R woulder:woulder /var/lib/woulder 2>/dev/null || true; chmod 750 /var/lib/woulder/uploads"

          # Create .env file on server with secrets
          ssh -i ~/.ssh/id_ed25519 root@${{ secrets.VPS_HOST }} "echo 'PORT=${{ secrets.PORT }}' > /opt/woulder/.env"
          ssh -i ~/.ssh/id_ed25519 root@${{ secrets.VPS_HOST }} "echo 'GIN_MODE=${{ secrets.GIN_MODE }}' >> /opt/woulder/.env"
          ssh -i ~/.ssh/id_ed25519 root@${{ secrets.VPS_HOST }} "echo 'OPENWEATHERMAP_API_KEY=${{ secrets.OPENWEATHERMAP_API_KEY }}' >> /opt/woulder/.env"
          ssh -i ~/.ssh/id_ed25519 root@${{ secrets.VPS_HOST }} "echo 'DB_HOST=${{ secrets.DB_HOST }}' >> /opt/woulder/.env"
          ssh -i ~/.ssh/id_ed25519 root@${{ secrets.VPS_HOST }} "echo 'DB_PORT=${{ secrets.DB_PORT }}' >> /opt/woulder/.env"
          ssh -i ~/.ssh/id_ed25519 root@${{ secrets.VPS_HOST }} "echo 'DB_USER=${{ secrets.DB_USER }}' >> /opt/woulder/.env"
          ssh -i ~/.ssh/id_ed25519 root@${{ secrets.VPS_HOST }} "echo 'DB_PASSWORD=${{ secrets.DB_PASSWORD }}' >> /opt/woulder/.env"
          ssh -i ~/.ssh/id_ed25519 root@${{ secrets.VPS_HOST }} "echo 'DB_NAME=${{ secrets.DB_NAME }}' >> /opt/woulder/.env"
          ssh -i ~/.ssh/id_ed25519 root@${{ secrets.VPS_HOST }} "echo 'DB_SSLMODE=${{ secrets.DB_SSLMODE }}' >> /opt/woulder/.env"
          ssh -i ~/.ssh/id_ed25519 root@${{ secrets.VPS_HOST }} "echo 'CACHE_DURATION=${{ secrets.CACHE_DURATION }}' >> /opt/woulder/.env"
          ssh -i ~/.ssh/id_ed25519 root@${{ secrets.VPS_HOST }} "echo 'ANALYTICS_JWT_SECRET=${{ secrets.ANALYTICS_JWT_SECRET }}' >> /opt/woulder/.env"
          ssh -i ~/.ssh/id_ed25519 root@${{ secrets.VPS_HOST }} "echo 'ANALYTICS_ADMIN_USERNAME=${{ secrets.ANALYTICS_ADMIN_USERNAME }}' >> /opt/woulder/.env"
          ssh -i ~/.ssh/id_ed25519 root@${{ secrets.VPS_HOST }} "echo 'ANALYTICS_ADMIN_PASSWORD=${{ secrets.ANALYTICS_ADMIN_PASSWORD }}' >> /opt/woulder/.env"
          ssh -i ~/.ssh/id_ed25519 root@${{ secrets.VPS_HOST }} "echo 'APP_JWT_SECRET=${{ secrets.APP_JWT_SECRET }}' >> /opt/woulder/.env"
          ssh -i ~/.ssh/id_ed25519 root@${{ secrets.VPS_HOST }} "echo 'APP_ACCESS_TOKEN_MINUTES=${{ secrets.APP_ACCESS_TOKEN_MINUTES }}' >> /opt/woulder/.env"
          ssh -i ~/.ssh/id_ed25519 root@${{ secrets.VPS_HOST }} "echo 'APP_REFRESH_TOKEN_DAYS=${{ secrets.APP_REFRESH_TOKEN_DAYS }}' >> /opt/woulder/.env"
          ssh -i ~/.ssh/id_ed25519 root@${{ secrets.VPS_HOST }} "echo 'APP_ADMIN_EMAIL=${{ secrets.APP_ADMIN_EMAIL }}' >> /opt/woulder/.env"
          ssh -i ~/.ssh/id_ed25519 root@${{ secrets.VPS_HOST }} "echo 'APP_ADMIN_PASSWORD=${{ secrets.APP_ADMIN_PASSWORD }}' >> /opt/woulder/.env"
          ssh -i ~/.ssh/id_ed25519 root@${{ secrets.VPS_HOST }} "echo 'APP_ADMIN_DISPLAY_NAME=${{ secrets.APP_ADMIN_DISPLAY_NAME }}' >> /opt/woulder/.env"
          ssh -i ~/.ssh/id_ed25519 root@${{ secrets.VPS_HOST }} "echo 'MONEY_USERNAME=${{ secrets.MONEY_USERNAME }}' >> /opt/woulder/.env"
          ssh -i ~/.ssh/id_ed25519 root@${{ secrets.VPS_HOST }} "echo 'MONEY_PASSWORD=${{ secrets.MONEY_PASSWORD }}' >> /opt/woulder/.env"
          ssh -i ~/.ssh/id_ed25519 root@${{ secrets.VPS_HOST }} "echo 'UPLOAD_STORAGE_DRIVER=local' >> /opt/woulder/.env"
          ssh -i ~/.ssh/id_ed25519 root@${{ secrets.VPS_HOST }} "echo 'UPLOAD_DIR=/var/lib/woulder/uploads' >> /opt/woulder/.env"
          ssh -i ~/.ssh/id_ed25519 root@${{ secrets.VPS_HOST }} "echo 'UPLOAD_MAX_BYTES=${{ secrets.UPLOAD_MAX_BYTES }}' >> /opt/woulder/.env"

          # Make executable, run migrations, and start
          ssh -i ~/.ssh/id_ed25519 root@${{ secrets.VPS_HOST }} "chmod +x /opt/woulder/woulder-api /opt/woulder/woulder-migrate && cd /opt/woulder && MIGRATIONS_PATH=/opt/woulder/migrations ./woulder-migrate up && systemctl start woulder"

      - name: Deploy frontend
        run: |
          # Clear old frontend files
          ssh -i ~/.ssh/id_ed25519 root@${{ secrets.VPS_HOST }} "rm -rf /var/www/woulder/*"

          # Upload new frontend
          scp -i ~/.ssh/id_ed25519 -r frontend/dist/* root@${{ secrets.VPS_HOST }}:/var/www/woulder/

      - name: Verify deployment
        run: |
          sleep 5
          # Try HTTPS first, fall back to HTTP (in case SSL isn't set up yet)
          curl -f --max-time 10 https://woulder.com/api/health 2>/dev/null || \
          curl -f --max-time 10 http://woulder.com/api/health 2>/dev/null || \
          echo "Health check pending - run 'certbot --nginx -d woulder.com -d www.woulder.com' on VPS for HTTPS"
